name: qseq_core
description: >-
  Pure-Dart domain core for QSeq — GS1/SGTIN encoders and the print-true
  sizing engine. Shared by the Flutter desktop app and the Jaspr web app so the
  encoders and capacity tables have a single source of truth.
publish_to: 'none'
version: 1.2.2

environment:
  sdk: ^3.12.1

# Pure Dart — no Flutter, no dart:ui. Runs on the Dart VM (Jaspr prerender) and
# compiled to JS (browser).
dependencies:
  barcode: ^2.2.9

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
